<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-ESRGAN — AI Image Enhancer</title>
    <meta name="description" content="Enhance and upscale images up to 4× using Real-ESRGAN deep learning super resolution">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Dynamic Background Scene -->
    <div class="bg-scene">
        <div class="bg-grid"></div>
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>
    
    <!-- Noise Texture Overlay -->
    <div class="noise-texture"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                    <line x1="12" y1="22.08" x2="12" y2="12"/>
                </svg>
                <div>
                    <h1>Real-ESRGAN</h1>
                    <p class="subtitle">Next-Gen Image Super Resolution</p>
                </div>
            </div>
            <div class="status-badge" id="statusBadge">
                <span class="status-dot"></span>
                <span class="status-text">Checking...</span>
            </div>
        </header>

        <!-- Main content -->
        <main class="main-content">
            <!-- Upload Section -->
            <section class="upload-section" id="uploadSection">
                <div class="upload-zone" id="uploadZone" tabindex="0" role="button" aria-label="Upload image">
                    <div class="upload-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                    </div>
                    <h2>Enhance Your Vision</h2>
                    <p>Drop image here or click to browse · JPEG, PNG, WEBP</p>
                    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/bmp,image/webp" hidden>
                </div>

                <!-- Scale selector -->
                <div class="controls" id="controls" style="display:none;">
                    <div class="preview-card glass-card">
                        <div class="preview-image-wrap">
                            <img id="previewImage" alt="Preview of uploaded image">
                        </div>
                        <div class="preview-info">
                            <span class="file-name" id="fileName"></span>
                            <span class="file-size" id="fileSize"></span>
                        </div>
                        <button class="btn-remove" id="removeBtn" title="Remove image">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                    </div>

                    <div class="scale-selector glass-card">
                        <label>Upscale Resolution</label>
                        <div class="scale-options">
                            <button class="scale-btn" data-scale="2">2X</button>
                            <button class="scale-btn active" data-scale="4">4X</button>
                        </div>
                    </div>

                    <button class="btn-primary" id="enhanceBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                        <span>Start Enhancement</span>
                    </button>
                </div>
            </section>

            <!-- Progress Section -->
            <section class="progress-section" id="progressSection" style="display:none;">
                <div class="progress-card glass-card">
                    <div class="spinner"></div>
                    <h2>Processing...</h2>
                    <p>Reaching deep into the pixels to reconstruct detail</p>
                    <div class="progress-bar-track">
                        <div class="progress-bar-fill" id="progressFill"></div>
                    </div>
                </div>
            </section>

            <!-- Result Section -->
            <section class="result-section" id="resultSection" style="display:none;">
                <div class="result-header">
                    <h2>Masterwork Created</h2>
                    <div class="result-meta">
                        <span class="meta-chip" id="originalSize"></span>
                        <span class="meta-chip enhanced" id="enhancedSize"></span>
                    </div>
                </div>

                <!-- Comparison slider -->
                <div class="comparison-container glass-card" id="comparisonContainer">
                    <div class="comparison-wrapper" id="comparisonWrapper">
                        <img class="comparison-img img-enhanced" id="enhancedImg" alt="Enhanced image">
                        <div class="comparison-overlay" id="comparisonOverlay">
                            <img class="comparison-img img-original" id="originalImg" alt="Original image">
                        </div>
                        <div class="comparison-slider" id="comparisonSlider">
                            <div class="slider-handle">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                    <polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/>
                                </svg>
                            </div>
                        </div>
                        <div class="comparison-label label-original">Raw</div>
                        <div class="comparison-label label-enhanced">Enhanced</div>
                    </div>
                </div>

                <div class="result-actions">
                    <button class="btn-primary btn-download" id="downloadBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        <span>Save Image</span>
                    </button>
                    <button class="btn-secondary" id="newBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                        <span>Upscale Another</span>
                    </button>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <p>Built with <strong>Real-ESRGAN</strong> tiny · Super Resolution Engine v1.0</p>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
